<svg viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="phoneBody" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eef0fb"/>
</linearGradient>
<linearGradient id="phoneScreen" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#e9e6fb"/><stop offset="50%" stop-color="#dbe6fb"/><stop offset="100%" stop-color="#e4dcf7"/>
</linearGradient>
<linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f3f1fc"/>
</linearGradient>
<linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#8a7bff"/>
</linearGradient>
<linearGradient id="accentGrad2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#6fc3ff"/><stop offset="100%" stop-color="#33e0ff"/>
</linearGradient>
<filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#3a2f7a" flood-opacity="0.22"/>
</filter>
</defs>

<!-- floating deco shapes -->
<circle cx="410" cy="70" r="26" fill="url(#accentGrad)" opacity="0.85"/>
<circle cx="80" cy="330" r="18" fill="#dfe3fb"/>
<rect x="40" y="140" width="30" height="30" rx="8" fill="#e3ddf9" transform="rotate(20 55 155)"/>
<rect x="430" y="220" width="26" height="26" rx="7" fill="url(#accentGrad2)" opacity="0.8" transform="rotate(-15 443 233)"/>
<rect x="30" y="230" width="60" height="18" rx="9" fill="#e9e6fb"/>

<!-- plus badge top right -->
<g transform="translate(455,140)" filter="url(#softShadow)">
<circle r="26" fill="#ffffff"/>
<path d="M-10 0 H10 M0 -10 V10" stroke="#16151d" stroke-width="3" stroke-linecap="round"/>
</g>

<!-- card left -->
<g transform="rotate(-14 200 200)" filter="url(#softShadow)">
<rect x="70" y="150" width="150" height="200" rx="20" fill="url(#cardGrad)"/>
<rect x="90" y="175" width="60" height="10" rx="5" fill="#c9c2f2"/>
<rect x="90" y="200" width="100" height="8" rx="4" fill="#e4e1f6"/>
<rect x="90" y="216" width="80" height="8" rx="4" fill="#e4e1f6"/>
<circle cx="105" cy="255" r="16" fill="url(#accentGrad)"/>
<rect x="90" y="285" width="100" height="8" rx="4" fill="#e4e1f6"/>
<rect x="90" y="300" width="70" height="8" rx="4" fill="#e4e1f6"/>
</g>

<!-- swatch stack -->
<g transform="translate(430,190) rotate(24)" filter="url(#softShadow)">
<rect width="60" height="60" rx="10" fill="#f4ede0"/>
<rect y="14" width="60" height="60" rx="10" fill="#e9e0f4"/>
<rect y="28" width="60" height="60" rx="10" fill="#dcecf7"/>
</g>

<!-- phone -->
<g transform="rotate(-8 260 260)" filter="url(#softShadow)">
<rect x="130" y="90" width="270" height="360" rx="42" fill="url(#phoneBody)"/>
<rect x="146" y="110" width="238" height="320" rx="26" fill="url(#phoneScreen)"/>
<circle cx="365" cy="128" r="5" fill="#ffffff" opacity="0.7"/>
<rect x="168" y="140" width="130" height="14" rx="7" fill="#ffffff" opacity="0.85"/>
<rect x="168" y="164" width="90" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
<circle cx="215" cy="235" r="34" fill="url(#accentGrad)" opacity="0.9"/>
<rect x="270" y="205" width="90" height="60" rx="14" fill="#ffffff" opacity="0.8"/>
<rect x="168" y="290" width="200" height="16" rx="8" fill="#ffffff" opacity="0.7"/>
<rect x="168" y="316" width="150" height="10" rx="5" fill="#ffffff" opacity="0.55"/>
<rect x="168" y="360" width="200" height="50" rx="14" fill="url(#accentGrad2)" opacity="0.85"/>
</g>

<!-- card bottom right -->
<g transform="translate(300,330) rotate(8)" filter="url(#softShadow)">
<rect width="140" height="90" rx="16" fill="url(#cardGrad)"/>
<rect x="16" y="18" width="70" height="9" rx="4.5" fill="#a99bf5"/>
<rect x="16" y="36" width="108" height="7" rx="3.5" fill="#e4e1f6"/>
<rect x="16" y="50" width="90" height="7" rx="3.5" fill="#e4e1f6"/>
<rect x="16" y="66" width="60" height="14" rx="7" fill="#33e0ff" opacity="0.55"/>
</g>

<!-- grid dots deco -->
<g fill="#d9d4f0">
<circle cx="60" cy="60" r="3"/><circle cx="76" cy="60" r="3"/><circle cx="92" cy="60" r="3"/>
<circle cx="60" cy="76" r="3"/><circle cx="76" cy="76" r="3"/><circle cx="92" cy="76" r="3"/>
</g>
</svg>
