<svg viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="hg1" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#b0339f"/><stop offset="100%" stop-color="#8b5cf6"/>
</linearGradient>
<linearGradient id="hg2" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#5690dc"/><stop offset="100%" stop-color="#35c9b8"/>
</linearGradient>
<filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#8b5cf6" flood-opacity="0.18"/>
</filter>
</defs>

<circle cx="400" cy="70" r="4" fill="#e8b23f"/>
<circle cx="60" cy="330" r="4" fill="#5690dc"/>
<circle cx="420" cy="300" r="3" fill="#b0339f"/>
<circle cx="40" cy="90" r="3" fill="#35c9b8"/>

<!-- connecting lines between nodes -->
<g stroke="#e3d6e8" stroke-width="2" fill="none">
<path d="M120 120 L200 90 L280 130"/>
<path d="M200 90 L210 190"/>
<path d="M280 130 L340 210"/>
<path d="M210 190 L150 260"/>
<path d="M210 190 L300 260"/>
<path d="M150 260 L180 330"/>
<path d="M300 260 L280 330"/>
</g>

<!-- nodes -->
<circle cx="120" cy="120" r="10" fill="#fff" stroke="url(#hg2)" stroke-width="3"/>
<circle cx="200" cy="90" r="8" fill="#fff" stroke="url(#hg1)" stroke-width="3"/>
<circle cx="280" cy="130" r="10" fill="#fff" stroke="url(#hg2)" stroke-width="3"/>
<circle cx="340" cy="210" r="8" fill="#fff" stroke="url(#hg1)" stroke-width="3"/>
<circle cx="150" cy="260" r="8" fill="#fff" stroke="url(#hg1)" stroke-width="3"/>
<circle cx="300" cy="260" r="8" fill="#fff" stroke="url(#hg2)" stroke-width="3"/>
<circle cx="180" cy="330" r="7" fill="#fff" stroke="url(#hg1)" stroke-width="3"/>
<circle cx="280" cy="330" r="7" fill="#fff" stroke="url(#hg2)" stroke-width="3"/>

<!-- central core -->
<g transform="translate(210,190)" filter="url(#soft)">
<circle r="58" fill="#ffffff"/>
<circle r="58" fill="none" stroke="url(#hg1)" stroke-width="2.5" stroke-dasharray="4 7"/>
<g transform="translate(-24,-24)">
<rect width="48" height="48" rx="14" fill="url(#hg1)"/>
<circle cx="17" cy="20" r="4.5" fill="#fff"/>
<circle cx="31" cy="20" r="4.5" fill="#fff"/>
<path d="M16 32 Q24 38 32 32" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<rect x="20" y="4" width="8" height="6" rx="2" fill="#fff" opacity="0.85"/>
</g>
</g>

<!-- card chip bottom right -->
<g transform="translate(300,300)" filter="url(#soft)">
<rect width="120" height="76" rx="16" fill="#ffffff"/>
<rect x="14" y="16" width="60" height="9" rx="4.5" fill="url(#hg2)"/>
<rect x="14" y="32" width="92" height="7" rx="3.5" fill="#ece9f2"/>
<rect x="14" y="46" width="70" height="7" rx="3.5" fill="#ece9f2"/>
<rect x="14" y="60" width="40" height="10" rx="5" fill="url(#hg1)" opacity="0.85"/>
</g>

<!-- floating deco -->
<rect x="30" y="200" width="26" height="26" rx="7" fill="#fdeef9" transform="rotate(18 43 213)"/>
<circle cx="420" cy="150" r="18" fill="#eef6fc"/>
</svg>
